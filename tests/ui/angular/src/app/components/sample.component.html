<!-- src/app/app.component.html -->
<ng-container [ngSwitch]="params.media">
  <TwicImg
      *ngSwitchCase="'img'"
      [src]="params.src"
      [alt]="params.alt"
      [anchor]="params.anchor"
      [bot]="params.bot"
      [eager]="params.eager"
      [focus]="params.focus"
      [intrinsic]="params.intrinsic"
      [mode]="params.mode"
      [position]="params.position"
      [placeholder]="params.placeholder"
      [preTransform]="params.preTransform"
      [ratio]="params.ratio"
      [refit]="params.refit"
      [step]="params.step"
      [title]="params.title"
      [transition]="params.transition"
      [transitionDelay]="params.transitionDelay"
      [transitionDuration]="params.transitionDuration"
      [transitionTimingFunction]="params.transitionTimingFunction"
      [zoom]="params.zoom"
  ></TwicImg>
  <TwicVideo
      *ngSwitchCase="'video'"
      [src]="params.src"
      [anchor]="params.anchor"
      [bot]="params.bot"
      [eager]="params.eager"
      [focus]="params.focus"
      [intrinsic]="params.intrinsic"
      [mode]="params.mode"
      [position]="params.position"
      [placeholder]="params.placeholder"
      [preTransform]="params.preTransform"
      [ratio]="params.ratio"
      [step]="params.step"
      [title]="params.title"
      [transition]="params.transition"
      [transitionDelay]="params.transitionDelay"
      [transitionDuration]="params.transitionDuration"
      [transitionTimingFunction]="params.transitionTimingFunction"
  ></TwicVideo>
  <TwicPicture
      *ngSwitchCase="'picture'"
      [src]="params.src"
      [alt]="params.alt"
      [anchor]="params.anchor"
      [eager]="params.eager"
      [fetchpriority]="params.fetchpriority"
      [focus]="params.focus"
      [mode]="params.mode"
      [position]="params.position"
      [preTransform]="params.preTransform"
      [ratio]="params.ratio"
      [refit]="params.refit"
      [title]="params.title"
  ></TwicPicture>
</ng-container>
